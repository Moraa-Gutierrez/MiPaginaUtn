        </ul>

    <h2>Registrarse</h2>
    <div class="contenedor-login">
        <div class="formulario">
            <form>
                <div class="input-group">
                    <label>Nombre:</label>
                    <input type="text" placeholder="ingresa tu nombre">
                </div>
                <div class="input-group">
                    <label>Apellido:</label>
                    <input type="text" placeholder="ingresa tu apellido">
                </div>
                <div class="input-group">
                    <label>Fecha de Nacimiento:</label>
                    <input type="date">
                </div>
                <div class="input-group">
                    <label>Email:</label>
                    <input type="email" placeholder="ingresa tu email">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="ingresa tu contraseña">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="confirma tu contraseña">
                </div>

                <div class="grupo-genero">
                    <label class="titulo-genero">Género:</label>
                    <div class="opciones-genero">
                        <input type="radio" id="g-masc" name="genero" value="m">
                        <label for="g-masc">Masculino</label>

                        <input type="radio" id="g-fem" name="genero" value="f">
                        <label for="g-fem">Femenino</label>

                        <input type="radio" id="g-otro" name="genero" value="o">
                        <label for="g-otro">Otro</label>
                    </div>
                </div>

                <button type="submit" class="btn-signup">Registrarse</button>
                
                <div class="social-contenedor">
                    <button type="button" class="social-btn">
                        <img src="google-icon.png" alt=""> Google
                    </button>
                    <button type="button" class="social-btn">
                        <img src="apple-icon.png" alt=""> Apple
                    </button>
                </div>
            </form>
            <p class="footer-form">¿Ya estás registrado? <a class="afooter" href="iniciarsesion.html">Inicia Sesión</a>
            </p>
        </div>
        <div class="image-section"></div>
    </div>
</body>
